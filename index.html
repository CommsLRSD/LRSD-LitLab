<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LitLab — LRSD Literacy Resource</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo-section">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                </svg>
                <h1 class="logo-text">LitLab</h1>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <section id="tools-section" class="content-section active" data-page="tools">
            <div id="flowchart-container" class="flowchart-view-hidden"></div>

            <!-- Hidden elements for app.js backward compatibility -->
            <div id="interventions-options-screen" class="interventions-options" style="display:none;" aria-hidden="true"></div>
            <div id="interventions-menu-full-view" class="interventions-detail-view" style="display:none;" aria-hidden="true"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>&copy; 2025 LitLab &middot; Louis Riel School Division &middot; Supporting educators in literacy intervention</p>
    </footer>

    <script src="app.js"></script>

    <script>
    (function() {
        // Intersection Observer for fade-in animations
        if ('IntersectionObserver' in window) {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.08 });

            document.querySelectorAll('.fade-in').forEach(function(el) {
                observer.observe(el);
            });
        } else {
            document.querySelectorAll('.fade-in').forEach(function(el) {
                el.classList.add('visible');
            });
        }
    })();
    </script>
</body>
</html>
